<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem AI - Studio Artistique</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { margin-bottom: 20px; color: #ff4757; }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #2f3542;
            border: 1px solid #57606f;
            border-radius: 6px;
            color: white;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        .options {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        select, button {
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }
        select {
            flex: 1;
            background-color: #2f3542;
            color: white;
            border: 1px solid #57606f;
        }
        button {
            background-color: #ff4757;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #e84118; }
        button:disabled { background-color: #747d8c; cursor: not-allowed; }
        .result-box {
            margin-top: 20px;
            min-height: 200px;
            border: 2px dashed #57606f;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        img { max-width: 100%; max-height: 400px; border-radius: 6px; }
        .loader { color: #ffa502; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Gem AI Studio</h1>
    <textarea id="prompt" placeholder="Entrez votre prompt ici..."></textarea>
    
    <div class="options">
        <select id="ratio">
            <option value="1:1">Carré (1:1)</option>
            <option value="16:9">Paysage (16:9)</option>
            <option value="9:16">Portrait (9:16)</option>
        </select>
        <button id="generateBtn" onclick="generateImage()">Générer ✨</button>
    </div>

    <div class="result-box" id="resultBox">
        <span style="color: #747d8c;">Votre chef-d'œuvre apparaîtra ici</span>
    </div>
</div>

<script>
    async function generateImage() {
        const prompt = document.getElementById('prompt').value;
        const ratio = document.getElementById('ratio').value;
        const btn = document.getElementById('generateBtn');
        const resultBox = document.getElementById('resultBox');

        if (!prompt.trim()) {
            alert("Veuillez entrer un prompt !");
            return;
        }

        btn.disabled = true;
        resultBox.innerHTML = '<span class="loader">Création en cours... (Patientez environ 10-30s)</span>';

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, ratio, format: 'jpg' })
            });

            if (!response.ok) throw new Error("Erreur lors de la génération");

            const blob = await response.blob();
            const imgUrl = URL.createObjectURL(blob);
            
            resultBox.innerHTML = `<img src="${imgUrl}" alt="Generated Art">`;
        } catch (error) {
            resultBox.innerHTML = `<span style="color: #ff4757;">❌ Échec : ${error.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
